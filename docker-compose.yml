services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:3000',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg://fortress:fortress@postgres:5432/fortressai
      - ENABLE_REAL_EXPRESSVPN=true
      - ENABLE_REAL_FABRIC=true
      - EXPRESSVPN_PROFILE=hk
      - FABRIC_PEER_ADDRESS=hyperledger:7051
      - JWT_SECRET_KEY=fortressai-dev-secret
      - ETHERSCAN_API_KEY=${ETHERSCAN_API_KEY:-}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - ELASTIC_INGEST_URL=${ELASTIC_INGEST_URL:-}
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/status >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      hyperledger:
        condition: service_healthy

  celery:
    build: ./backend
    command: celery -A app.tasks.celery_app worker -l info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg://fortress:fortress@postgres:5432/fortressai
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping -d celery@$$HOSTNAME | grep -q pong || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 30s

  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=fortress
      - POSTGRES_PASSWORD=fortress
      - POSTGRES_DB=fortressai
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fortress -d fortressai -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  hyperledger:
    image: hyperledger/fabric-peer:2.5
    command: ["sh", "-c", "peer version && sleep infinity"]
    ports:
      - "7051:7051"
    healthcheck:
      test: ["CMD-SHELL", "peer version >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  pgdata:
