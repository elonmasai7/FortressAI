apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: fortress-nodepool
  namespace: fortressai
spec:
  template:
    spec:
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["m6i.large", "m6i.xlarge"]
      kubelet:
        maxPods: 110
  limits:
    cpu: "100"
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s
