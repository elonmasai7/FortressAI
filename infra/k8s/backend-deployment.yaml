apiVersion: apps/v1
kind: Deployment
metadata:
  name: fortress-backend
  namespace: fortressai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fortress-backend
  template:
    metadata:
      labels:
        app: fortress-backend
    spec:
      containers:
        - name: backend
          image: fortressai/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: DATABASE_URL
              value: postgresql+psycopg://fortress:fortress@postgres:5432/fortressai
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: fortressai-secrets
                  key: JWT_SECRET_KEY
            - name: ETHERSCAN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fortressai-secrets
                  key: ETHERSCAN_API_KEY
            - name: ELASTIC_INGEST_URL
              valueFrom:
                secretKeyRef:
                  name: fortressai-secrets
                  key: ELASTIC_INGEST_URL
                  optional: true
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fortressai-secrets
                  key: SENDGRID_API_KEY
                  optional: true
            - name: ALERT_EMAIL_TO
              valueFrom:
                secretKeyRef:
                  name: fortressai-secrets
                  key: ALERT_EMAIL_TO
                  optional: true
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: fortressai-secrets
                  key: TWILIO_ACCOUNT_SID
                  optional: true
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fortressai-secrets
                  key: TWILIO_AUTH_TOKEN
                  optional: true
            - name: TWILIO_FROM_NUMBER
              valueFrom:
                secretKeyRef:
                  name: fortressai-secrets
                  key: TWILIO_FROM_NUMBER
                  optional: true
            - name: TWILIO_TO_NUMBER
              valueFrom:
                secretKeyRef:
                  name: fortressai-secrets
                  key: TWILIO_TO_NUMBER
                  optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: fortressai
spec:
  selector:
    app: fortress-backend
  ports:
    - port: 8000
      targetPort: 8000
