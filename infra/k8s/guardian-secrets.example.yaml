apiVersion: v1
kind: Secret
metadata:
  name: fortressai-secrets
  namespace: fortressai
type: Opaque
stringData:
  JWT_SECRET_KEY: "replace-with-strong-secret"
  ETHERSCAN_API_KEY: "replace-with-etherscan-key"
  ELASTIC_INGEST_URL: "https://your-elastic-endpoint/security-events"
  SENDGRID_API_KEY: "replace-with-sendgrid-key"
  ALERT_EMAIL_TO: "soc@example.com"
  TWILIO_ACCOUNT_SID: "replace-with-twilio-sid"
  TWILIO_AUTH_TOKEN: "replace-with-twilio-token"
  TWILIO_FROM_NUMBER: "+10000000000"
  TWILIO_TO_NUMBER: "+10000000001"
